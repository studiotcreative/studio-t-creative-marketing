<!-- @dsCard group="Type" viewport="700x170" name="Script Accent" subtitle="Sacramento — signature flourish, decorative only" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-blush); display:flex; align-items:center; gap: 30px; }
  .script { font-family: var(--font-script); font-size: 64px; color: var(--terracotta-600); line-height: 1; }
  .note { font-family: var(--font-sans); font-size: 12px; color: var(--text-body); max-width: 280px; line-height: 1.55; }
  .note strong { color: var(--text-strong); }
</style>
</head>
<body>
  <div class="script">creative</div>
  <div class="note"><strong>--font-script</strong> echoes the wordmark signature. Reserve for one accent word per layout — never body text, never all-caps.</div>
</body>
</html>
