<!-- @dsCard group="Type" viewport="700x250" name="Body & Sans" subtitle="Montserrat — UI, body copy & labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--surface-page); font-family: var(--font-sans); }
  .lead { font-size: 17px; line-height: 1.65; color: var(--text-body); max-width: 560px; margin: 0 0 16px; }
  .weights { display: flex; gap: 20px; flex-wrap: wrap; align-items: baseline; }
  .w { font-size: 20px; color: var(--text-strong); }
  .cap { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; font-weight: 400; }
</style>
</head>
<body>
  <p class="lead">We help you define your brand, communicate clearly, and build structured content and conversion systems that turn attention into action.</p>
  <div class="weights">
    <div><span class="w" style="font-weight:300">Light</span><span class="cap">300</span></div>
    <div><span class="w" style="font-weight:400">Regular</span><span class="cap">400</span></div>
    <div><span class="w" style="font-weight:500">Medium</span><span class="cap">500</span></div>
    <div><span class="w" style="font-weight:600">Semibold</span><span class="cap">600</span></div>
    <div><span class="w" style="font-weight:700">Bold</span><span class="cap">700</span></div>
  </div>
</body>
</html>
