<!-- @dsCard group="Colors" viewport="700x190" name="Semantic & Status" subtitle="Surface, text and functional aliases" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .cell { }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid var(--hairline); }
  .name { font-weight: 600; font-size: 12px; color: var(--text-strong); margin-top: 8px; }
  .tok { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="chip" style="background:var(--surface-card)"></div><div class="name">Card</div><div class="tok">--surface-card</div></div>
    <div class="cell"><div class="chip" style="background:var(--surface-blush)"></div><div class="name">Blush</div><div class="tok">--surface-blush</div></div>
    <div class="cell"><div class="chip" style="background:var(--surface-brand)"></div><div class="name">Brand</div><div class="tok">--surface-brand</div></div>
    <div class="cell"><div class="chip" style="background:var(--surface-inverse)"></div><div class="name">Inverse</div><div class="tok">--surface-inverse</div></div>
    <div class="cell"><div class="chip" style="background:var(--success)"></div><div class="name">Success</div><div class="tok">--success</div></div>
    <div class="cell"><div class="chip" style="background:var(--warning)"></div><div class="name">Warning</div><div class="tok">--warning</div></div>
    <div class="cell"><div class="chip" style="background:var(--error)"></div><div class="name">Error</div><div class="tok">--error</div></div>
    <div class="cell"><div class="chip" style="background:var(--info)"></div><div class="name">Info</div><div class="tok">--info</div></div>
  </div>
</body>
</html>
