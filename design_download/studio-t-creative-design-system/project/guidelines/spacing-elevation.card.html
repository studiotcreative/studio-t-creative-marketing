<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation" subtitle="Warm, soft-tinted shadows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 30px 24px; background: var(--surface-page); font-family: var(--font-sans); display:flex; gap: 26px; flex-wrap: wrap; align-items:center; }
  .item { text-align: center; }
  .box { width: 96px; height: 64px; background: var(--surface-card); border-radius: var(--radius-lg); }
  .name { font-size: 11px; color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="name">sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="name">md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="name">lg</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="name">xl</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-brand);background:var(--terracotta-600)"></div><div class="name">brand</div></div>
</body>
</html>
