<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--surface-page); }
  .big { font-family: var(--font-display); font-weight: 500; font-size: 64px; line-height: 1.04; letter-spacing: -0.02em; color: var(--text-strong); margin: 0; }
  .alpha { font-family: var(--font-display); font-weight: 400; font-size: 26px; color: var(--text-accent); margin: 14px 0 4px; letter-spacing: 0.01em; }
  .meta { font-family: var(--font-sans); font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <p class="big">Strategic Brand Growth</p>
  <div class="alpha">AaBbCcDd · Gg Qq Rr · 1234567890 &amp;</div>
  <div class="meta">--font-display · weights 400 / 500 / 600 / 700 · use for headlines, big numbers, editorial moments</div>
</body>
</html>
