<!-- @dsCard group="Spacing" viewport="700x180" name="Corner Radii" subtitle="Soft, rounded — capsule CTAs" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-sans); display:flex; gap: 20px; flex-wrap: wrap; }
  .item { text-align: center; }
  .box { width: 76px; height: 60px; background: var(--blush-200); border: 1.5px solid var(--rose-400); }
  .name { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="name">sm · 8</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="name">md · 12</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="name">lg · 18</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="name">xl · 28</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="name">2xl · 40</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="name">pill</div></div>
</body>
</html>
