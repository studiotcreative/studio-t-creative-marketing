<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="Display headings down to captions" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--hairline); padding: 9px 0; }
  .line:last-child { border-bottom: 0; }
  .sample { color: var(--text-strong); flex: 1; line-height: 1.05; }
  .ser { font-family: var(--font-display); font-weight: 500; }
  .san { font-family: var(--font-sans); }
  .tok { font-family: var(--font-sans); font-size: 11px; color: var(--text-muted); white-space: nowrap; }
</style>
</head>
<body>
  <div class="line"><span class="sample ser" style="font-size:48px">Brand Growth</span><span class="tok">4xl · 54 / display</span></div>
  <div class="line"><span class="sample ser" style="font-size:33px">Clarity &amp; momentum</span><span class="tok">3xl · 33 / display</span></div>
  <div class="line"><span class="sample ser" style="font-size:24px">Content that converts</span><span class="tok">2xl · 26 / display</span></div>
  <div class="line"><span class="sample san" style="font-size:16px;font-weight:400">Body — we turn attention into action.</span><span class="tok">base · 16 / sans</span></div>
  <div class="line"><span class="sample san" style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-accent)">Eyebrow label</span><span class="tok">xs · 12 / sans caps</span></div>
</body>
</html>
