<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="4px base rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 9px; }
  .bar { height: 16px; background: var(--rose-400); border-radius: 3px; }
  .tok { font-size: 11px; color: var(--text-muted); width: 86px; }
  .px { font-size: 11px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="row"><span class="tok">--space-2</span><span class="bar" style="width:8px"></span><span class="px">8</span></div>
  <div class="row"><span class="tok">--space-4</span><span class="bar" style="width:16px"></span><span class="px">16</span></div>
  <div class="row"><span class="tok">--space-6</span><span class="bar" style="width:24px"></span><span class="px">24</span></div>
  <div class="row"><span class="tok">--space-8</span><span class="bar" style="width:32px"></span><span class="px">32</span></div>
  <div class="row"><span class="tok">--space-12</span><span class="bar" style="width:48px"></span><span class="px">48</span></div>
  <div class="row"><span class="tok">--space-16</span><span class="bar" style="width:64px"></span><span class="px">64</span></div>
</body>
</html>
