<html lang="en">

<link rel="stylesheet" href="../../styles.css">

</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>

    const { Card, Stat, Badge } = window.StudioTCreativeDesignSystem_34f7c6;
    function Demo() {
      return (
        <div>
          <div className="grid">
            <Card variant="surface" eyebrow="Service" title="Brand Foundation">
              <p>Positioning, identity and messaging that give every touchpoint a clear, consistent base to grow from.</p>
            </Card>
            <Card variant="blush" eyebrow="Why us" title="Clarity first">
              <p>Scattered marketing becomes one aligned growth system.</p>

          </div>
          <div className="stats">
            <Stat value="250%" label="Increase in brand awareness" tone="cream" />
            <Stat value="50+" label="Happy clients partnered with us" tone="rose" />
            <Stat value="500+" label="Strategies delivered" tone="cream" />
          </div>
          <div className="badges">
            <Badge tone="brand">New</Badge>
            <Badge tone="accent">Featured</Badge>
            <Badge tone="neutral">Branding</Badge>

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
