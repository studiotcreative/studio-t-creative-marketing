<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--surface-page); }
  .wrap { max-width: 420px; display: flex; flex-direction: column; gap: 18px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Field, Select, Checkbox } = window.StudioTCreativeDesignSystem_34f7c6;
    const { useState } = React;
    function Demo() {
      const [ok, setOk] = useState(true);
      return (
        <div className="wrap">
          <Field label="Full Name" htmlFor="n" required>
            <Input id="n" placeholder="Jordan Rivera" defaultValue="Jordan Rivera" />
          </Field>
          <Field label="What are you trying to improve?" htmlFor="s">
            <Select id="s" defaultValue="Brand Identity">
              <option>Brand Identity</option>
              <option>Content System</option>
              <option>Marketing Strategy</option>
              <option>Not sure</option>
            </Select>
          </Field>
          <Field label="Email" htmlFor="e" error="Please enter a valid email">
            <Input id="e" type="email" invalid defaultValue="jordan@" />
          </Field>
          <Checkbox checked={ok} onChange={() => setOk(!ok)} label="Send me the monthly Resource Hub" />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
