<!-- @startingPoint section="Website" subtitle="Studio T Creative marketing homepage" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Studio T Creative — Marketing Site</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; background: var(--cream-100); scroll-behavior: smooth; }
  .svc-tile:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
  a { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;
    function App() {
      const [active, setActive] = useState('Home');
      const onNav = (l) => {
        setActive(l);
        if (l === 'Contact' || l === 'Services' || l === 'Home') {
          const id = l === 'Contact' ? 'contact' : l === 'Services' ? 'services' : 'root';
          const el = document.getElementById(id);
          if (el) window.scrollTo({ top: l === 'Home' ? 0 : el.offsetTop - 70, behavior: 'smooth' });
        }
      };
      useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
      return (
        <div>
          <STHeader onNav={onNav} active={active} />
          <main id="home">
            <STHero onNav={onNav} />
            <STServices onNav={onNav} />
            <STStatsBand />
            <STAbout />
            <STClients />
            <STContact />
          </main>
          <STFooter onNav={onNav} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>window.addEventListener('load', () => { if (window.lucide) window.lucide.createIcons(); });</script>
</body>
</html>
