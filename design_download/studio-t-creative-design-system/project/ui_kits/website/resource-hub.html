<!-- @startingPoint section="Website" subtitle="Resource Hub lead-gen landing page with gated guide downloads" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Studio T Creative — Resource Hub</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; background: var(--cream-100); scroll-behavior: smooth; }
  a { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel" src="resource-hub.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    function App() {
      const { RHeader, RHero, FeaturedGuide, Library, ProofBand, FinalCTA, LeadModal } = window.RH;
      const [unlocked, setUnlocked] = useState(false);
      const [modalGuide, setModalGuide] = useState(null);

      const getGuide = (g) => setModalGuide(g);           // open modal for a guide
      const unlockAll = () => setUnlocked(true);          // hero email capture
      const completeLead = () => setUnlocked(true);       // submitting modal also unlocks

      const goSite = (l) => {
        const anchor = l === 'Contact' ? '#contact' : l === 'Services' ? '#services' : '';
        window.location.href = 'index.html' + anchor;
      };

      return (
        <div>
          <RHeader unlocked={unlocked} />
          <main>
            <RHero onUnlock={unlockAll} unlocked={unlocked} />
            <FeaturedGuide onGet={getGuide} />
            <Library onGet={getGuide} />
            <ProofBand />
            <FinalCTA />
          </main>
          <STFooter onNav={goSite} />
          <LeadModal guide={modalGuide} onClose={() => setModalGuide(null)} onComplete={completeLead} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>window.addEventListener('load', () => { if (window.lucide) window.lucide.createIcons(); });</script>
</body>
</html>
